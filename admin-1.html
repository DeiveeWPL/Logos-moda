<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>LOGOS · Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#130f1e; --panel:#1c1730; --panel2:#241d3c; --line:#2f2748;
    --accent:#8367ff; --accent-weak:rgba(131,103,255,.16);
    --ink:#f4f1fb; --mut:#9d93bd; --mut2:#6f6790;
    --amber:#e6a53d; --green:#43c07d; --red:#e0625e; --blue:#5b8def;
    --radius:16px; --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:Inter,system-ui,sans-serif; line-height:1.5;
    min-height:100dvh; overflow-x:clip;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .star{color:var(--accent)}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}

  /* ---------- LOGIN ---------- */
  #login{min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; gap:6px}
  #login .mark{width:54px;height:54px;margin-bottom:10px}
  #login h1{font-family:Cormorant,serif; font-weight:600; font-size:34px; letter-spacing:.08em; margin:0; text-transform:uppercase}
  #login .sub{color:var(--mut); font-size:13px; letter-spacing:.14em; text-transform:uppercase; margin-bottom:26px}
  #login form{width:100%; max-width:340px; display:flex; flex-direction:column; gap:12px}
  .fld label{display:block; font-size:12px; color:var(--mut); margin:0 0 6px 2px; letter-spacing:.03em}
  .fld input,.fld select{width:100%; padding:14px 15px; border-radius:12px; font-size:16px; background:var(--panel); border:1px solid var(--line); color:var(--ink); outline:none}
  .fld input:focus,.fld select:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-weak)}
  .btn{border:none; border-radius:12px; padding:15px; font-size:15px; font-weight:600; background:var(--accent); color:#fff; letter-spacing:.02em; transition:.15s}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.55}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--ink)}
  .btn-soft{background:var(--accent-weak); color:var(--accent)}
  .err{color:var(--red); font-size:13px; min-height:18px; text-align:center; margin-top:2px}

  /* ---------- APP SHELL ---------- */
  #app{display:none; max-width:560px; margin:0 auto; padding-bottom:40px}
  .topbar{position:sticky; top:0; z-index:20; background:rgba(19,15,30,.85); backdrop-filter:blur(12px); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; padding:14px 16px}
  .topbar .mark{width:26px;height:26px}
  .topbar b{font-family:Cormorant,serif; font-weight:600; font-size:22px; letter-spacing:.12em; text-transform:uppercase}
  .topbar .spacer{flex:1}
  .logout{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:7px 11px;font-size:12.5px}

  .tabs{display:flex; gap:8px; padding:14px 16px 6px}
  .tab{flex:1; text-align:center; padding:11px 6px; border-radius:11px; font-size:14px; font-weight:600; background:var(--panel); border:1px solid var(--line); color:var(--mut)}
  .tab.on{background:var(--accent); border-color:var(--accent); color:#fff}
  .tab .n{font-size:11px; opacity:.85; font-weight:500}

  .wrap{padding:8px 16px 0}
  .view{display:none}
  .view.on{display:block; animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .chips{display:flex; gap:8px; overflow-x:auto; padding:8px 0 14px; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap; padding:8px 13px; border-radius:999px; font-size:13px; font-weight:500; background:var(--panel); border:1px solid var(--line); color:var(--mut)}
  .chip.on{background:var(--accent-weak); border-color:var(--accent); color:var(--ink)}

  .ocard{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px 15px; margin-bottom:11px; display:flex; align-items:center; gap:12px}
  .ocard:active{border-color:var(--accent)}
  .ocard .oc-main{flex:1; min-width:0}
  .ocard .oc-name{font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .ocard .oc-meta{font-size:12.5px; color:var(--mut); margin-top:2px}
  .ocard .oc-tot{font-weight:700; font-size:15px; white-space:nowrap}
  .pill{display:inline-block; font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px; letter-spacing:.03em; margin-top:6px}
  .pill.pending{background:rgba(230,165,61,.16); color:var(--amber)}
  .pill.paid{background:rgba(67,192,125,.16); color:var(--green)}
  .pill.shipped{background:rgba(91,141,239,.18); color:var(--blue)}
  .pill.cancelled{background:rgba(224,98,94,.16); color:var(--red)}
  .pill.off{background:rgba(157,147,189,.16); color:var(--mut)}

  .empty{text-align:center; color:var(--mut); padding:48px 20px; font-size:14px}
  .empty .star{display:block; font-size:26px; margin-bottom:10px}
  .loading{text-align:center;color:var(--mut);padding:40px;font-size:14px}

  /* products list */
  .toolbar{display:flex;gap:9px;margin:2px 0 14px}
  .toolbar .btn{flex:1;padding:13px}
  .prod-row{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:12px; margin-bottom:11px; display:flex; gap:12px; align-items:center}
  .prod-row:active{border-color:var(--accent)}
  .prod-row .thumb{width:52px;height:64px;border-radius:9px;object-fit:cover;background:var(--panel2);flex-shrink:0}
  .prod-row .pr-main{flex:1;min-width:0}
  .prod-row .pr-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prod-row .pr-sub{font-size:12.5px;color:var(--mut);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prod-row .pr-tags{margin-top:5px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .tag2{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:999px;background:var(--panel2);color:var(--mut);letter-spacing:.02em}
  .prod-row .pr-price{font-weight:700;font-size:14px;white-space:nowrap}

  /* stock rows */
  .prow{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px 15px; margin-bottom:11px}
  .prow-head{display:flex; align-items:center; gap:10px}
  .prow-head .pinfo{flex:1; min-width:0}
  .prow-head .pname{font-weight:600; font-size:15px}
  .prow-head .psub{font-size:12px; color:var(--mut); margin-top:1px}
  .prow-head .ptot{font-size:13px; font-weight:600; color:var(--mut)}
  .prow-head .ptot b{color:var(--ink)}
  .sizes{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:13px}
  .sz{background:var(--panel2); border:1px solid var(--line); border-radius:11px; padding:8px 6px; text-align:center}
  .sz .k{font-size:11px; color:var(--mut); letter-spacing:.06em}
  .stepper{display:flex; align-items:center; justify-content:center; gap:8px; margin-top:5px}
  .stepper button{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center}
  .stepper .v{min-width:22px;text-align:center;font-weight:700;font-size:15px}
  .prow .save-row{margin-top:13px; display:flex; gap:9px; align-items:center}
  .prow .save-row .btn{flex:1; padding:12px}
  .saved-ok{font-size:12.5px;color:var(--green);opacity:0;transition:.2s}
  .saved-ok.show{opacity:1}

  /* sheets */
  .sheet-bg{position:fixed; inset:0; background:rgba(8,6,14,.6); backdrop-filter:blur(3px); z-index:50; opacity:0; pointer-events:none; transition:.2s}
  .sheet-bg.open{opacity:1; pointer-events:auto}
  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:51; max-width:560px; margin:0 auto; background:var(--panel); border-radius:22px 22px 0 0; border:1px solid var(--line); border-bottom:none; padding:8px 18px calc(24px + env(safe-area-inset-bottom)); transform:translateY(100%); transition:transform .26s cubic-bezier(.2,.8,.2,1); max-height:92dvh; overflow-y:auto}
  .sheet.open{transform:none}
  .grab{width:38px;height:4px;border-radius:99px;background:var(--line);margin:6px auto 14px}
  .sheet h3{font-family:Cormorant,serif;font-weight:600;font-size:24px;margin:0 0 2px;letter-spacing:.02em}
  .sheet .oid{font-size:12px;color:var(--mut2);word-break:break-all;margin-bottom:14px}
  .sec-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin:16px 0 8px}
  .line-item{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .line-item:last-child{border-bottom:none}
  .line-item .li-q{color:var(--mut)}
  .kv{font-size:14px;margin:4px 0}
  .kv span{color:var(--mut)}
  .addr{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 13px;font-size:14px;margin-top:4px}
  .totbar{display:flex;justify-content:space-between;align-items:center;margin:16px 0 4px;font-size:17px}
  .totbar b{font-weight:700}
  .rcpt{display:inline-block;margin-top:10px;color:var(--accent);font-size:13.5px;text-decoration:none;border-bottom:1px solid var(--accent-weak)}
  .actions{display:flex;flex-direction:column;gap:9px;margin-top:20px}
  .actions .btn{width:100%}
  .actions .btn-danger{background:transparent;border:1px solid rgba(224,98,94,.5);color:var(--red)}

  /* form */
  .form-fld{margin-bottom:13px}
  .form-fld label{display:block;font-size:12px;color:var(--mut);margin:0 0 6px 2px;letter-spacing:.03em}
  .form-fld input,.form-fld select{width:100%;padding:13px 14px;border-radius:11px;font-size:16px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);outline:none}
  .form-fld input:focus,.form-fld select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;padding:12px;border-radius:11px;font-size:14px;font-weight:600;background:var(--panel2);border:1px solid var(--line);color:var(--mut)}
  .seg button.on{background:var(--accent-weak);border-color:var(--accent);color:var(--ink)}
  .photos{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .photo-slot{position:relative;border:1px dashed var(--line);border-radius:12px;aspect-ratio:3/4;overflow:hidden;background:var(--panel2);display:flex;align-items:center;justify-content:center;text-align:center}
  .photo-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .photo-slot .ph-label{font-size:12px;color:var(--mut);padding:10px;z-index:1;position:relative;pointer-events:none}
  .photo-slot input[type=file]{position:absolute;inset:0;opacity:0}
  .photo-slot.filled{border-style:solid;border-color:var(--accent)}
  .photo-busy{position:absolute;inset:0;background:rgba(19,15,30,.7);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink);z-index:2}
  .switch-row{display:flex;align-items:center;justify-content:space-between;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:12px 14px}
  .switch-row .sr-t{font-size:14px}
  .switch-row .sr-t small{display:block;color:var(--mut);font-size:12px}
  .sw{width:46px;height:27px;border-radius:99px;background:var(--line);position:relative;border:none;flex-shrink:0;transition:.2s}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s}
  .sw.on{background:var(--green)}
  .sw.on::after{left:22px}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#fff;color:#1a1330;padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;z-index:80;opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow);white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .banner{background:var(--accent-weak);border:1px solid var(--accent);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:13.5px;color:var(--ink)}
  .banner .btn{margin-top:10px;width:100%;padding:11px;font-size:13.5px}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<section id="login">
  <svg class="mark" viewBox="0 0 24 24"><path d="M12 1.5 L13.8 10.2 L22.5 12 L13.8 13.8 L12 22.5 L10.2 13.8 L1.5 12 L10.2 10.2 Z" fill="#8367ff"/></svg>
  <h1>Logos</h1>
  <div class="sub">Painel</div>
  <form id="loginForm" autocomplete="on">
    <div class="fld"><label for="email">E-mail</label><input id="email" type="email" inputmode="email" autocomplete="username" placeholder="voce@email.com" required></div>
    <div class="fld"><label for="pass">Senha</label><input id="pass" type="password" autocomplete="current-password" placeholder="••••••••" required></div>
    <button class="btn" type="submit" id="loginBtn">Entrar</button>
    <div class="err" id="loginErr"></div>
  </form>
</section>

<!-- ===================== APP ===================== -->
<main id="app">
  <div class="topbar">
    <svg class="mark" viewBox="0 0 24 24"><path d="M12 1.5 L13.8 10.2 L22.5 12 L13.8 13.8 L12 22.5 L10.2 13.8 L1.5 12 L10.2 10.2 Z" fill="#8367ff"/></svg>
    <b>Logos</b><div class="spacer"></div>
    <button class="logout" id="logoutBtn">Sair</button>
  </div>

  <div class="tabs">
    <button class="tab on" data-tab="orders">Pedidos<div class="n" id="tabOrdCount">—</div></button>
    <button class="tab" data-tab="products">Produtos<div class="n" id="tabProdCount">—</div></button>
    <button class="tab" data-tab="stock">Estoque<div class="n">rápido</div></button>
  </div>

  <div class="wrap">
    <section class="view on" id="viewOrders">
      <div class="chips" id="ordChips">
        <button class="chip on" data-f="all">Todos</button>
        <button class="chip" data-f="pending">Pendentes</button>
        <button class="chip" data-f="paid">Pagos</button>
        <button class="chip" data-f="shipped">Despachados</button>
        <button class="chip" data-f="cancelled">Cancelados</button>
      </div>
      <div id="ordList"><div class="loading">Carregando pedidos…</div></div>
    </section>

    <section class="view" id="viewProducts">
      <div id="importBanner"></div>
      <div class="toolbar"><button class="btn" id="newProdBtn">＋ Novo produto</button></div>
      <div id="prodList"><div class="loading">Carregando produtos…</div></div>
    </section>

    <section class="view" id="viewStock">
      <div id="stockList"><div class="loading">Carregando estoque…</div></div>
    </section>
  </div>
</main>

<!-- order detail sheet -->
<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet"><div class="grab"></div><div id="sheetBody"></div></div>

<!-- product form sheet -->
<div class="sheet-bg" id="formBg"></div>
<div class="sheet" id="formSheet"><div class="grab"></div><div id="formBody"></div></div>

<div class="toast" id="toast"></div>

  const SIZES = ['P','M','G','GG'];
  const STATUS_LABEL = {pending:'Pendente', paid:'Pago', shipped:'Despachado', cancelled:'Cancelado'};
  const $ = id => document.getElementById(id);
  const loginSec=$('login'), appSec=$('app');
  let ORDERS=[], CATALOG=[], curFilter='all', stockDraft={}, formState=null;

  function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
  function money(n){return 'R$ '+(Number(n)||0).toFixed(2).replace('.',',');}
  function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
  function priceNum(p){if(typeof p==='number')return p;return parseFloat(String(p||'').replace(/[^\d,]/g,'').replace(',','.'))||0;}
  function fmtDate(ts){try{const d=ts&&ts.toDate?ts.toDate():(ts?new Date(ts):null);if(!d)return '—';return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}catch(e){return '—';}}
  function shortId(id){return (id||'').replace('LOGOS-','#').slice(0,14);}
  function sumStock(ss){return SIZES.reduce((s,k)=>s+((ss&&ss[k])||0),0);}

  /* ---------- AUTH ---------- */
  auth.onAuthStateChanged(user=>{
    if(user){loginSec.style.display='none';appSec.style.display='block';loadOrders();loadCatalog();}
    else{appSec.style.display='none';loginSec.style.display='flex';}
  });
  $('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const btn=$('loginBtn'), err=$('loginErr'); err.textContent='';
    btn.disabled=true; btn.textContent='Entrando…';
    try{ await auth.signInWithEmailAndPassword($('email').value.trim(), $('pass').value); $('pass').value=''; }
    catch(ex){
      const map={'auth/invalid-email':'E-mail inválido.','auth/user-not-found':'Usuário não encontrado.','auth/wrong-password':'Senha incorreta.','auth/invalid-credential':'E-mail ou senha incorretos.','auth/too-many-requests':'Muitas tentativas. Espere um pouco.','auth/network-request-failed':'Sem conexão. Tente de novo.'};
      err.textContent = map[ex.code] || ('Erro ao entrar ('+ex.code+')');
    }finally{ btn.disabled=false; btn.textContent='Entrar'; }
  });
  $('logoutBtn').addEventListener('click', ()=>auth.signOut());

  /* ---------- TABS ---------- */
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
      t.classList.add('on');
      const tab=t.dataset.tab;
      $('viewOrders').classList.toggle('on', tab==='orders');
      $('viewProducts').classList.toggle('on', tab==='products');
      $('viewStock').classList.toggle('on', tab==='stock');
    });
  });

  /* ---------- ORDERS ---------- */
  async function loadOrders(){
    try{
      const snap = await db.collection('orders').orderBy('createdAt','desc').get();
      ORDERS = snap.docs.map(d=>({id:d.id, ...d.data()}));
      renderOrders();
    }catch(ex){ $('ordList').innerHTML='<div class="empty"><span class="star">✦</span>Não consegui carregar os pedidos.<br><small style="color:var(--mut2)">'+(ex.code||ex.message||'')+'</small></div>'; }
  }
  document.querySelectorAll('#ordChips .chip').forEach(c=>{
    c.addEventListener('click', ()=>{document.querySelectorAll('#ordChips .chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');curFilter=c.dataset.f;renderOrders();});
  });
  function renderOrders(){
    const list = curFilter==='all' ? ORDERS : ORDERS.filter(o=>(o.status||'pending')===curFilter);
    const pend = ORDERS.filter(o=>(o.status||'pending')==='pending').length;
    $('tabOrdCount').textContent = ORDERS.length + (pend?(' · '+pend+' nov'+(pend>1?'os':'o')):'');
    const el=$('ordList');
    if(!list.length){el.innerHTML='<div class="empty"><span class="star">✦</span>'+(curFilter==='all'?'Nenhum pedido ainda.':'Nenhum pedido nesse filtro.')+'</div>';return;}
    el.innerHTML=list.map(o=>{
      const st=o.status||'pending', nm=(o.customer&&o.customer.name)||'Sem nome';
      const nItems=(o.items||[]).reduce((s,i)=>s+(i.qty||0),0);
      return `<div class="ocard" data-oid="${o.id}"><div class="oc-main"><div class="oc-name">${esc(nm)}</div><div class="oc-meta">${shortId(o.id)} · ${fmtDate(o.createdAt)} · ${nItems} ${nItems===1?'peça':'peças'}</div><span class="pill ${st}">${STATUS_LABEL[st]||st}</span></div><div class="oc-tot">${money(o.total)}</div></div>`;
    }).join('');
    el.querySelectorAll('.ocard').forEach(c=>c.addEventListener('click', ()=>openSheet(c.dataset.oid)));
  }
  function openSheet(oid){
    const o=ORDERS.find(x=>x.id===oid); if(!o)return;
    const st=o.status||'pending', c=o.customer||{};
    const itemsHtml=(o.items||[]).map(i=>`<div class="line-item"><div>${esc(i.name)}<br><span class="li-q">Tam. ${esc(i.size)} · Qtd ${i.qty}${i.col?(' · '+esc(i.col)):''}</span></div><div>${money(priceNum(i.price)*(i.qty||1))}</div></div>`).join('')||'<div class="kv"><span>Sem itens.</span></div>';
    const aL=[]; if(c.street)aL.push(esc(c.street)); if(c.number)aL.push('Nº '+esc(c.number)); if(c.complement)aL.push(esc(c.complement)); if(c.cep)aL.push('CEP '+esc(c.cep));
    const addrBlock=aL.length?'<div class="addr">'+aL.join('<br>')+'</div>':(c.address?'<div class="addr">'+esc(c.address)+'</div>':'<div class="kv"><span>Sem endereço.</span></div>');
    let actions='';
    if(st==='pending')actions+=`<button class="btn" data-act="paid">Marcar como pago</button>`;
    if(st==='paid'||st==='pending')actions+=`<button class="btn btn-soft" data-act="shipped">Marcar como despachado</button>`;
    if(st==='shipped')actions+=`<button class="btn btn-ghost" data-act="paid">Voltar para “pago”</button>`;
    if(st!=='cancelled')actions+=`<button class="btn btn-danger" data-act="cancelled">Cancelar pedido</button>`;
    if(st==='cancelled')actions+=`<button class="btn btn-ghost" data-act="pending">Reabrir pedido</button>`;
    $('sheetBody').innerHTML=`<h3>${esc(c.name||'Pedido')}</h3><div class="oid">${esc(o.id)}</div><span class="pill ${st}">${STATUS_LABEL[st]||st}</span>
      <div class="sec-label">Itens</div>${itemsHtml}<div class="totbar"><span>Total</span><b>${money(o.total)}</b></div>
      <div class="sec-label">Contato</div><div class="kv"><span>WhatsApp:</span> ${esc(c.phone||'—')}</div>
      ${c.phone?`<a class="rcpt" href="https://wa.me/${String(c.phone).replace(/\D/g,'')}" target="_blank">Abrir conversa no WhatsApp →</a>`:''}
      <div class="sec-label">Entrega</div>${addrBlock}
      ${o.receiptUrl?`<div class="sec-label">Comprovante</div><a class="rcpt" href="${esc(o.receiptUrl)}" target="_blank">Ver recibo do pagamento →</a>`:''}
      <div class="actions">${actions}</div>`;
    $('sheetBody').querySelectorAll('[data-act]').forEach(b=>b.addEventListener('click', ()=>updateStatus(o.id,b.dataset.act,b)));
    $('sheetBg').classList.add('open'); $('sheet').classList.add('open'); document.body.style.overflow='hidden';
  }
  async function updateStatus(oid,status,btn){
    const label=btn.textContent; btn.disabled=true; btn.textContent='Salvando…';
    try{
      const patch={status};
      if(status==='paid')patch.paidAt=firebase.firestore.FieldValue.serverTimestamp();
      if(status==='shipped')patch.shippedAt=firebase.firestore.FieldValue.serverTimestamp();
      await db.collection('orders').doc(oid).update(patch);
      const o=ORDERS.find(x=>x.id===oid); if(o)o.status=status;
      renderOrders(); closeSheet(); toast('Pedido: '+(STATUS_LABEL[status]||status));
    }catch(ex){ btn.disabled=false; btn.textContent=label; toast('Erro ao salvar ('+(ex.code||'')+')'); }
  }
  function closeSheet(){$('sheetBg').classList.remove('open');$('sheet').classList.remove('open');document.body.style.overflow='';}
  $('sheetBg').addEventListener('click', closeSheet);

  /* ---------- CATALOG (produtos + estoque) ---------- */
  async function loadCatalog(){
    try{
      const snap=await db.collection('products').get();
      CATALOG=snap.docs.map(d=>({id:d.id, ...d.data()})).filter(p=>p.name);
      CATALOG.sort((a,b)=>((a.sortOrder==null?999:a.sortOrder)-(b.sortOrder==null?999:b.sortOrder)));
    }catch(ex){ CATALOG=[]; }
    $('tabProdCount').textContent = CATALOG.length + (CATALOG.length===1?' item':' itens');
    renderProducts(); renderStock(); renderImportBanner();
  }
  function renderImportBanner(){
    const have=new Set(CATALOG.map(p=>p.id));
    const missing=SEED.filter(s=>!have.has(s.id));
    const b=$('importBanner');
    if(missing.length){
      b.innerHTML=`<div class="banner">Detectei ${missing.length} produto(s) da sua loja atual que ainda não estão no banco. Toque para importar de uma vez (nome, fotos, tamanhos e preço).<button class="btn" id="importBtn">Importar produtos atuais</button></div>`;
      $('importBtn').addEventListener('click', importSeed);
    }else{ b.innerHTML=''; }
  }
  async function importSeed(){
    const btn=$('importBtn'); if(btn){btn.disabled=true;btn.textContent='Importando…';}
    try{
      const have=new Set(CATALOG.map(p=>p.id));
      for(const s of SEED){ if(have.has(s.id))continue;
        await db.collection('products').doc(s.id).set({
          name:s.name, sub:s.sub, price:s.price, collection:s.collection,
          sizeStock:s.sizeStock, images:s.images, active:s.active, sortOrder:s.sortOrder,
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        }, {merge:true});
      }
      toast('Produtos importados ✦'); await loadCatalog();
    }catch(ex){ toast('Erro ao importar ('+(ex.code||'')+')'); if(btn){btn.disabled=false;btn.textContent='Importar produtos atuais';} }
  }
  function renderProducts(){
    const el=$('prodList');
    if(!CATALOG.length){ el.innerHTML='<div class="empty"><span class="star">✦</span>Nenhum produto ainda.<br>Toque em “Novo produto” para começar.</div>'; return; }
    el.innerHTML=CATALOG.map(p=>{
      const total=sumStock(p.sizeStock), img=(p.images&&p.images.front)||'';
      const coll=p.collection==='essentials'?'Essentials':'Scripture';
      const onoff=p.active===false?'<span class="pill off">Fora da loja</span>':'<span class="pill paid">Na loja</span>';
      return `<div class="prod-row" data-pid="${p.id}">
        <img class="thumb" src="${img}" alt="">
        <div class="pr-main">
          <div class="pr-name">${esc(p.name)}</div>
          <div class="pr-sub">${esc(p.sub||'')}</div>
          <div class="pr-tags"><span class="tag2">${coll}</span><span class="tag2">${total} em estoque</span>${onoff}</div>
        </div>
        <div class="pr-price">${money(p.price)}</div>
      </div>`;
    }).join('');
    el.querySelectorAll('.prod-row').forEach(r=>r.addEventListener('click', ()=>openProductForm(r.dataset.pid)));
  }
  $('newProdBtn').addEventListener('click', ()=>openProductForm(null));

  /* ---------- PRODUCT FORM ---------- */
  function blankProduct(){return {id:null,name:'',sub:'',price:'',collection:'scripture',sizeStock:{P:0,M:0,G:0,GG:0},images:{front:'',back:''},active:true};}
  function openProductForm(pid){
    const src = pid ? CATALOG.find(p=>p.id===pid) : null;
    formState = src ? JSON.parse(JSON.stringify(Object.assign(blankProduct(), src))) : blankProduct();
    if(!formState.images) formState.images={front:'',back:''};
    if(!formState.sizeStock) formState.sizeStock={P:0,M:0,G:0,GG:0};
    const editing=!!pid;
    $('formBody').innerHTML=`
      <h3>${editing?'Editar produto':'Novo produto'}</h3>
      <div class="oid">${editing?esc(pid):'Vai aparecer na vitrine da loja'}</div>

      <div class="form-fld"><label>Nome</label><input id="fName" type="text" placeholder="Ex.: Walk by Faith" value="${esc(formState.name)}"></div>
      <div class="form-fld"><label>Descrição (cor · versículo)</label><input id="fSub" type="text" placeholder="Ex.: Preto · João 1:1" value="${esc(formState.sub||'')}"></div>
      <div class="form-fld"><label>Preço (R$)</label><input id="fPrice" type="number" inputmode="decimal" step="0.01" placeholder="79.90" value="${formState.price!==''&&formState.price!=null?priceNum(formState.price):''}"></div>

      <div class="form-fld"><label>Coleção</label>
        <div class="seg" id="fColl">
          <button data-c="scripture" class="${formState.collection!=='essentials'?'on':''}">Scripture</button>
          <button data-c="essentials" class="${formState.collection==='essentials'?'on':''}">Essentials</button>
        </div>
      </div>

      <div class="sec-label">Estoque por tamanho</div>
      <div class="sizes" id="fSizes">
        ${SIZES.map(k=>`<div class="sz"><div class="k">${k}</div><div class="stepper"><button data-fstep="-1" data-k="${k}">−</button><span class="v" data-fv="${k}">${formState.sizeStock[k]||0}</span><button data-fstep="1" data-k="${k}">+</button></div></div>`).join('')}
      </div>

      <div class="sec-label">Fotos</div>
      <div class="photos">
        <div class="photo-slot ${formState.images.front?'filled':''}" id="slotFront">
          ${formState.images.front?`<img src="${formState.images.front}" alt="">`:''}
          <span class="ph-label">Frente<br>toque para escolher</span>
          <input type="file" accept="image/*" id="fileFront">
        </div>
        <div class="photo-slot ${formState.images.back?'filled':''}" id="slotBack">
          ${formState.images.back?`<img src="${formState.images.back}" alt="">`:''}
          <span class="ph-label">Costas<br>(opcional)</span>
          <input type="file" accept="image/*" id="fileBack">
        </div>
      </div>

      <div class="sec-label">Visibilidade</div>
      <div class="switch-row"><div class="sr-t">Mostrar na loja<small>Desligue para esconder sem apagar</small></div><button class="sw ${formState.active!==false?'on':''}" id="fActive"></button></div>

      <div class="actions">
        <button class="btn" id="saveProdBtn">${editing?'Salvar alterações':'Criar produto'}</button>
        ${editing?'<button class="btn btn-danger" id="delProdBtn">Excluir produto</button>':''}
        <button class="btn btn-ghost" id="cancelProdBtn">Cancelar</button>
      </div>`;

    $('fColl').querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{
      formState.collection=b.dataset.c;
      $('fColl').querySelectorAll('button').forEach(x=>x.classList.toggle('on', x.dataset.c===b.dataset.c));
    }));
    $('fSizes').querySelectorAll('[data-fstep]').forEach(b=>b.addEventListener('click', ()=>{
      const k=b.dataset.k, dir=parseInt(b.dataset.fstep,10);
      formState.sizeStock[k]=Math.max(0,(formState.sizeStock[k]||0)+dir);
      $('fSizes').querySelector(`[data-fv="${k}"]`).textContent=formState.sizeStock[k];
    }));
    $('fActive').addEventListener('click', ()=>{ formState.active = !( formState.active!==false ); $('fActive').classList.toggle('on', formState.active!==false); });
    $('fileFront').addEventListener('change', e=>handlePhoto(e,'front','slotFront'));
    $('fileBack').addEventListener('change', e=>handlePhoto(e,'back','slotBack'));
    $('saveProdBtn').addEventListener('click', saveProduct);
    $('cancelProdBtn').addEventListener('click', closeForm);
    if(editing) $('delProdBtn').addEventListener('click', ()=>deleteProduct(pid));

    $('formBg').classList.add('open'); $('formSheet').classList.add('open'); document.body.style.overflow='hidden';
    $('formSheet').scrollTop=0;
  }
  function closeForm(){$('formBg').classList.remove('open');$('formSheet').classList.remove('open');document.body.style.overflow='';formState=null;}
  $('formBg').addEventListener('click', closeForm);

  function compressImage(file, maxDim, q){
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=()=>{ const img=new Image();
        img.onload=()=>{ let w=img.width,h=img.height,m=Math.max(w,h);
          if(m>maxDim){const r=maxDim/m;w=Math.round(w*r);h=Math.round(h*r);}
          const c=document.createElement('canvas');c.width=w;c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          resolve(c.toDataURL('image/jpeg',q)); };
        img.onerror=reject; img.src=reader.result; };
      reader.onerror=reject; reader.readAsDataURL(file);
    });
  }
  async function handlePhoto(e, which, slotId){
    const file=e.target.files&&e.target.files[0]; if(!file)return;
    const slot=$(slotId);
    const busy=document.createElement('div'); busy.className='photo-busy'; busy.textContent='Otimizando…'; slot.appendChild(busy);
    try{
      const dataUrl=await compressImage(file, 1000, 0.72);
      formState.images[which]=dataUrl;
      let img=slot.querySelector('img'); if(!img){img=document.createElement('img');slot.insertBefore(img,slot.firstChild);}
      img.src=dataUrl; slot.classList.add('filled');
    }catch(ex){ toast('Não deu para ler a foto'); }
    finally{ busy.remove(); e.target.value=''; }
  }
  async function saveProduct(){
    const btn=$('saveProdBtn');
    const name=($('fName').value||'').trim();
    const sub=($('fSub').value||'').trim();
    const price=parseFloat(($('fPrice').value||'').replace(',','.'))||0;
    if(!name){toast('Digite o nome');return;}
    if(price<=0){toast('Digite um preço válido');return;}
    if(!formState.images.front){toast('Adicione ao menos a foto da frente');return;}
    btn.disabled=true; btn.textContent='Salvando…';
    const data={
      name, sub, price, collection:formState.collection||'scripture',
      sizeStock:formState.sizeStock, images:formState.images,
      active: formState.active!==false
    };
    try{
      if(formState.id){
        await db.collection('products').doc(formState.id).update(data);
        toast('Produto atualizado ✦');
      }else{
        const maxOrder=CATALOG.reduce((m,p)=>Math.max(m,(p.sortOrder||0)),0);
        data.sortOrder=maxOrder+1;
        data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('products').add(data);
        toast('Produto criado ✦');
      }
      closeForm(); await loadCatalog();
    }catch(ex){ btn.disabled=false; btn.textContent='Salvar'; toast('Erro ao salvar ('+(ex.code||'')+')'); }
  }
  async function deleteProduct(pid){
    if(!confirm('Excluir este produto de vez? Isso não pode ser desfeito. (Dica: se quiser só tirar da loja, use o botão “Mostrar na loja”.)'))return;
    try{ await db.collection('products').doc(pid).delete(); toast('Produto excluído'); closeForm(); await loadCatalog(); }
    catch(ex){ toast('Erro ao excluir ('+(ex.code||'')+')'); }
  }

  /* ---------- ESTOQUE (rápido) ---------- */
  function renderStock(){
    const el=$('stockList');
    if(!CATALOG.length){ el.innerHTML='<div class="empty"><span class="star">✦</span>Cadastre produtos na aba “Produtos” para ajustar o estoque aqui.</div>'; return; }
    stockDraft={}; CATALOG.forEach(p=>stockDraft[p.id]={...(p.sizeStock||{P:0,M:0,G:0,GG:0})});
    el.innerHTML=CATALOG.map(p=>`
      <div class="prow" data-pid="${p.id}">
        <div class="prow-head"><div class="pinfo"><div class="pname">${esc(p.name)}</div><div class="psub">${esc(p.sub||'')}</div></div><div class="ptot">Total <b data-tot="${p.id}">${sumStock(stockDraft[p.id])}</b></div></div>
        <div class="sizes">
          ${SIZES.map(k=>`<div class="sz"><div class="k">${k}</div><div class="stepper"><button data-step="-1" data-pid="${p.id}" data-k="${k}">−</button><span class="v" data-v="${p.id}-${k}">${stockDraft[p.id][k]||0}</span><button data-step="1" data-pid="${p.id}" data-k="${k}">+</button></div></div>`).join('')}
        </div>
        <div class="save-row"><button class="btn" data-save="${p.id}">Salvar estoque</button><span class="saved-ok" data-ok="${p.id}">✦ salvo</span></div>
      </div>`).join('');
    el.querySelectorAll('[data-step]').forEach(b=>b.addEventListener('click', ()=>{
      const pid=b.dataset.pid,k=b.dataset.k,dir=parseInt(b.dataset.step,10);
      stockDraft[pid][k]=Math.max(0,(stockDraft[pid][k]||0)+dir);
      el.querySelector(`[data-v="${pid}-${k}"]`).textContent=stockDraft[pid][k];
      el.querySelector(`[data-tot="${pid}"]`).textContent=sumStock(stockDraft[pid]);
    }));
    el.querySelectorAll('[data-save]').forEach(b=>b.addEventListener('click', ()=>saveStock(b.dataset.save,b)));
  }
  async function saveStock(pid,btn){
    btn.disabled=true; const orig=btn.textContent; btn.textContent='Salvando…';
    try{
      await db.collection('products').doc(pid).set({sizeStock:stockDraft[pid]},{merge:true});
      const p=CATALOG.find(x=>x.id===pid); if(p)p.sizeStock={...stockDraft[pid]};
      const ok=document.querySelector(`[data-ok="${pid}"]`); if(ok){ok.classList.add('show');setTimeout(()=>ok.classList.remove('show'),1800);}
      toast('Estoque salvo');
    }catch(ex){ toast('Erro ao salvar ('+(ex.code||'')+')'); }
    finally{ btn.disabled=false; btn.textContent=orig; }
  }
</script>
</body>
</html>
