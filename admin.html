<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>LOGOS · Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#130f1e; --panel:#1c1730; --panel2:#241d3c; --line:#2f2748;
    --accent:#8367ff; --accent-weak:rgba(131,103,255,.16);
    --ink:#f4f1fb; --mut:#9d93bd; --mut2:#6f6790;
    --amber:#e6a53d; --green:#43c07d; --red:#e0625e; --blue:#5b8def;
    --radius:16px; --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:Inter,system-ui,sans-serif; line-height:1.5;
    min-height:100dvh; overflow-x:clip;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .star{color:var(--accent)}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}

  /* ---------- LOGIN ---------- */
  #login{
    min-height:100dvh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:32px 24px; gap:6px;
  }
  #login .mark{width:54px;height:54px;margin-bottom:10px}
  #login h1{
    font-family:Cormorant,serif; font-weight:600; font-size:34px;
    letter-spacing:.08em; margin:0; text-transform:uppercase;
  }
  #login .sub{color:var(--mut); font-size:13px; letter-spacing:.14em; text-transform:uppercase; margin-bottom:26px}
  #login form{width:100%; max-width:340px; display:flex; flex-direction:column; gap:12px}
  .fld label{display:block; font-size:12px; color:var(--mut); margin:0 0 6px 2px; letter-spacing:.03em}
  .fld input{
    width:100%; padding:14px 15px; border-radius:12px; font-size:16px;
    background:var(--panel); border:1px solid var(--line); color:var(--ink); outline:none;
  }
  .fld input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-weak)}
  .btn{
    border:none; border-radius:12px; padding:15px; font-size:15px; font-weight:600;
    background:var(--accent); color:#fff; letter-spacing:.02em; transition:.15s;
  }
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.55}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--ink)}
  .btn-soft{background:var(--accent-weak); color:var(--accent)}
  .err{color:var(--red); font-size:13px; min-height:18px; text-align:center; margin-top:2px}

  /* ---------- APP SHELL ---------- */
  #app{display:none; max-width:560px; margin:0 auto; padding-bottom:40px}
  .topbar{
    position:sticky; top:0; z-index:20; background:rgba(19,15,30,.85);
    backdrop-filter:blur(12px); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:10px; padding:14px 16px;
  }
  .topbar .mark{width:26px;height:26px}
  .topbar b{font-family:Cormorant,serif; font-weight:600; font-size:22px; letter-spacing:.12em; text-transform:uppercase}
  .topbar .spacer{flex:1}
  .logout{background:none;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:7px 11px;font-size:12.5px}

  .tabs{display:flex; gap:8px; padding:14px 16px 6px}
  .tab{
    flex:1; text-align:center; padding:11px; border-radius:11px; font-size:14px; font-weight:600;
    background:var(--panel); border:1px solid var(--line); color:var(--mut);
  }
  .tab.on{background:var(--accent); border-color:var(--accent); color:#fff}
  .tab .n{font-size:11px; opacity:.85; font-weight:500}

  .wrap{padding:8px 16px 0}
  .view{display:none}
  .view.on{display:block; animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* filter chips */
  .chips{display:flex; gap:8px; overflow-x:auto; padding:8px 0 14px; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    white-space:nowrap; padding:8px 13px; border-radius:999px; font-size:13px; font-weight:500;
    background:var(--panel); border:1px solid var(--line); color:var(--mut);
  }
  .chip.on{background:var(--accent-weak); border-color:var(--accent); color:var(--ink)}

  /* order card */
  .ocard{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 15px; margin-bottom:11px; display:flex; align-items:center; gap:12px;
  }
  .ocard:active{border-color:var(--accent)}
  .ocard .oc-main{flex:1; min-width:0}
  .ocard .oc-name{font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .ocard .oc-meta{font-size:12.5px; color:var(--mut); margin-top:2px}
  .ocard .oc-tot{font-weight:700; font-size:15px; white-space:nowrap}
  .pill{
    display:inline-block; font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px;
    letter-spacing:.03em; margin-top:6px;
  }
  .pill.pending{background:rgba(230,165,61,.16); color:var(--amber)}
  .pill.paid{background:rgba(67,192,125,.16); color:var(--green)}
  .pill.shipped{background:rgba(91,141,239,.18); color:var(--blue)}
  .pill.cancelled{background:rgba(224,98,94,.16); color:var(--red)}

  .empty{text-align:center; color:var(--mut); padding:48px 20px; font-size:14px}
  .empty .star{display:block; font-size:26px; margin-bottom:10px}
  .loading{text-align:center;color:var(--mut);padding:40px;font-size:14px}

  /* stock rows */
  .prow{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 15px; margin-bottom:11px;
  }
  .prow-head{display:flex; align-items:center; gap:10px}
  .prow-head .pinfo{flex:1; min-width:0}
  .prow-head .pname{font-weight:600; font-size:15px}
  .prow-head .psub{font-size:12px; color:var(--mut); margin-top:1px}
  .prow-head .ptot{font-size:13px; font-weight:600; color:var(--mut)}
  .prow-head .ptot b{color:var(--ink)}
  .sizes{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:13px}
  .sz{background:var(--panel2); border:1px solid var(--line); border-radius:11px; padding:8px 6px; text-align:center}
  .sz .k{font-size:11px; color:var(--mut); letter-spacing:.06em}
  .stepper{display:flex; align-items:center; justify-content:center; gap:8px; margin-top:5px}
  .stepper button{
    width:26px;height:26px;border-radius:8px;border:1px solid var(--line);
    background:var(--bg);color:var(--ink);font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;
  }
  .stepper .v{min-width:22px;text-align:center;font-weight:700;font-size:15px}
  .prow .save-row{margin-top:13px; display:flex; gap:9px; align-items:center}
  .prow .save-row .btn{flex:1; padding:12px}
  .saved-ok{font-size:12.5px;color:var(--green);opacity:0;transition:.2s}
  .saved-ok.show{opacity:1}

  /* ---------- SHEET (order detail) ---------- */
  .sheet-bg{
    position:fixed; inset:0; background:rgba(8,6,14,.6); backdrop-filter:blur(3px);
    z-index:50; opacity:0; pointer-events:none; transition:.2s;
  }
  .sheet-bg.open{opacity:1; pointer-events:auto}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:51; max-width:560px; margin:0 auto;
    background:var(--panel); border-radius:22px 22px 0 0; border:1px solid var(--line); border-bottom:none;
    padding:8px 18px calc(24px + env(safe-area-inset-bottom));
    transform:translateY(100%); transition:transform .26s cubic-bezier(.2,.8,.2,1);
    max-height:88dvh; overflow-y:auto;
  }
  .sheet.open{transform:none}
  .grab{width:38px;height:4px;border-radius:99px;background:var(--line);margin:6px auto 14px}
  .sheet h3{font-family:Cormorant,serif;font-weight:600;font-size:24px;margin:0 0 2px;letter-spacing:.02em}
  .sheet .oid{font-size:12px;color:var(--mut2);word-break:break-all;margin-bottom:14px}
  .sec-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin:16px 0 8px}
  .line-item{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .line-item:last-child{border-bottom:none}
  .line-item .li-q{color:var(--mut)}
  .kv{font-size:14px;margin:4px 0}
  .kv span{color:var(--mut)}
  .addr{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 13px;font-size:14px;margin-top:4px}
  .totbar{display:flex;justify-content:space-between;align-items:center;margin:16px 0 4px;font-size:17px}
  .totbar b{font-weight:700}
  .rcpt{display:inline-block;margin-top:10px;color:var(--accent);font-size:13.5px;text-decoration:none;border-bottom:1px solid var(--accent-weak)}
  .actions{display:flex;flex-direction:column;gap:9px;margin-top:20px}
  .actions .btn{width:100%}
  .actions .btn-danger{background:transparent;border:1px solid rgba(224,98,94,.5);color:var(--red)}

  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:#fff;color:#1a1330;padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;
    z-index:80;opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow);white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<section id="login">
  <svg class="mark" viewBox="0 0 24 24" fill="none"><path d="M12 1.5 L13.8 10.2 L22.5 12 L13.8 13.8 L12 22.5 L10.2 13.8 L1.5 12 L10.2 10.2 Z" fill="#8367ff"/></svg>
  <h1>Logos</h1>
  <div class="sub">Painel</div>
  <form id="loginForm" autocomplete="on">
    <div class="fld">
      <label for="email">E-mail</label>
      <input id="email" type="email" inputmode="email" autocomplete="username" placeholder="voce@email.com" required>
    </div>
    <div class="fld">
      <label for="pass">Senha</label>
      <input id="pass" type="password" autocomplete="current-password" placeholder="••••••••" required>
    </div>
    <button class="btn" type="submit" id="loginBtn">Entrar</button>
    <div class="err" id="loginErr"></div>
  </form>
</section>

<!-- ===================== APP ===================== -->
<main id="app">
  <div class="topbar">
    <svg class="mark" viewBox="0 0 24 24"><path d="M12 1.5 L13.8 10.2 L22.5 12 L13.8 13.8 L12 22.5 L10.2 13.8 L1.5 12 L10.2 10.2 Z" fill="#8367ff"/></svg>
    <b>Logos</b>
    <div class="spacer"></div>
    <button class="logout" id="logoutBtn">Sair</button>
  </div>

  <div class="tabs">
    <button class="tab on" data-tab="orders">Pedidos<div class="n" id="tabOrdCount">—</div></button>
    <button class="tab" data-tab="stock">Estoque<div class="n">4 produtos</div></button>
  </div>

  <div class="wrap">
    <!-- ORDERS -->
    <section class="view on" id="viewOrders">
      <div class="chips" id="ordChips">
        <button class="chip on" data-f="all">Todos</button>
        <button class="chip" data-f="pending">Pendentes</button>
        <button class="chip" data-f="paid">Pagos</button>
        <button class="chip" data-f="shipped">Despachados</button>
        <button class="chip" data-f="cancelled">Cancelados</button>
      </div>
      <div id="ordList"><div class="loading">Carregando pedidos…</div></div>
    </section>

    <!-- STOCK -->
    <section class="view" id="viewStock">
      <div id="stockList"><div class="loading">Carregando estoque…</div></div>
    </section>
  </div>
</main>

<!-- order detail sheet -->
<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div id="sheetBody"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script>
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDYwccg6JeDxIldIhXxdSmyPHTD1jbu9_I",
    authDomain: "logos-moda.firebaseapp.com",
    projectId: "logos-moda",
    storageBucket: "logos-moda.firebasestorage.app",
    messagingSenderId: "367068914355",
    appId: "1:367068914355:web:7fa0cd5fd48568cceec6c6"
  };
  firebase.initializeApp(FIREBASE_CONFIG);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // produtos conhecidos (nome/sub vivem no HTML da loja; aqui só pra rotular o estoque)
  const PRODUCTS = [
    {id:'walk-by-faith',   name:'Walk by Faith',   sub:'Preto · 2 Coríntios 5:7'},
    {id:'the-light-shines',name:'The Light Shines',sub:'Roxo · João 1:5'},
    {id:'made-new',        name:'Made New',        sub:'Cinza · 2 Coríntios 5:17'},
    {id:'in-the-beginning',name:'In the Beginning',sub:'Preto · João 1:1'},
  ];
  const SIZES = ['P','M','G','GG'];
  const STATUS_LABEL = {pending:'Pendente', paid:'Pago', shipped:'Despachado', cancelled:'Cancelado'};

  const $ = id => document.getElementById(id);
  const loginSec=$('login'), appSec=$('app');
  let ORDERS = [];        // cache dos pedidos
  let curFilter = 'all';
  let stockDraft = {};    // {productId: {P,M,G,GG}}

  function toast(msg){
    const t=$('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
  }
  function money(n){ return 'R$ '+(Number(n)||0).toFixed(2).replace('.',','); }
  function fmtDate(ts){
    try{
      const d = ts&&ts.toDate ? ts.toDate() : (ts?new Date(ts):null);
      if(!d) return '—';
      return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+
             d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    }catch(e){ return '—'; }
  }
  function shortId(id){ return (id||'').replace('LOGOS-','#').slice(0,14); }

  /* ---------------- AUTH ---------------- */
  auth.onAuthStateChanged(user=>{
    if(user){
      loginSec.style.display='none';
      appSec.style.display='block';
      loadOrders();
      loadStock();
    }else{
      appSec.style.display='none';
      loginSec.style.display='flex';
    }
  });

  $('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const btn=$('loginBtn'), err=$('loginErr');
    err.textContent='';
    btn.disabled=true; btn.textContent='Entrando…';
    try{
      await auth.signInWithEmailAndPassword($('email').value.trim(), $('pass').value);
      $('pass').value='';
    }catch(ex){
      const map={
        'auth/invalid-email':'E-mail inválido.',
        'auth/user-not-found':'Usuário não encontrado.',
        'auth/wrong-password':'Senha incorreta.',
        'auth/invalid-credential':'E-mail ou senha incorretos.',
        'auth/too-many-requests':'Muitas tentativas. Espere um pouco.',
        'auth/network-request-failed':'Sem conexão. Tente de novo.'
      };
      err.textContent = map[ex.code] || ('Erro ao entrar ('+ex.code+')');
    }finally{
      btn.disabled=false; btn.textContent='Entrar';
    }
  });

  $('logoutBtn').addEventListener('click', ()=>auth.signOut());

  /* ---------------- TABS ---------------- */
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
      t.classList.add('on');
      const tab=t.dataset.tab;
      $('viewOrders').classList.toggle('on', tab==='orders');
      $('viewStock').classList.toggle('on', tab==='stock');
    });
  });

  /* ---------------- ORDERS ---------------- */
  async function loadOrders(){
    try{
      const snap = await db.collection('orders').orderBy('createdAt','desc').get();
      ORDERS = snap.docs.map(d=>({id:d.id, ...d.data()}));
      renderOrders();
    }catch(ex){
      $('ordList').innerHTML = '<div class="empty"><span class="star">✦</span>Não consegui carregar os pedidos.<br><small style="color:var(--mut2)">'+(ex.code||ex.message||'')+'</small></div>';
    }
  }

  document.querySelectorAll('#ordChips .chip').forEach(c=>{
    c.addEventListener('click', ()=>{
      document.querySelectorAll('#ordChips .chip').forEach(x=>x.classList.remove('on'));
      c.classList.add('on'); curFilter=c.dataset.f; renderOrders();
    });
  });

  function renderOrders(){
    const list = curFilter==='all' ? ORDERS : ORDERS.filter(o=>(o.status||'pending')===curFilter);
    const pend = ORDERS.filter(o=>(o.status||'pending')==='pending').length;
    $('tabOrdCount').textContent = ORDERS.length + (pend?(' · '+pend+' nov'+(pend>1?'os':'o')):'');
    const el=$('ordList');
    if(!list.length){
      el.innerHTML='<div class="empty"><span class="star">✦</span>'+
        (curFilter==='all'?'Nenhum pedido ainda.':'Nenhum pedido nesse filtro.')+'</div>';
      return;
    }
    el.innerHTML = list.map(o=>{
      const st=o.status||'pending';
      const nm=(o.customer&&o.customer.name)||'Sem nome';
      const nItems=(o.items||[]).reduce((s,i)=>s+(i.qty||0),0);
      return `<div class="ocard" data-oid="${o.id}">
        <div class="oc-main">
          <div class="oc-name">${esc(nm)}</div>
          <div class="oc-meta">${shortId(o.id)} · ${fmtDate(o.createdAt)} · ${nItems} ${nItems===1?'peça':'peças'}</div>
          <span class="pill ${st}">${STATUS_LABEL[st]||st}</span>
        </div>
        <div class="oc-tot">${money(o.total)}</div>
      </div>`;
    }).join('');
    el.querySelectorAll('.ocard').forEach(c=>{
      c.addEventListener('click', ()=>openSheet(c.dataset.oid));
    });
  }

  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

  /* ---------- order detail sheet ---------- */
  function openSheet(oid){
    const o = ORDERS.find(x=>x.id===oid); if(!o) return;
    const st=o.status||'pending';
    const c=o.customer||{};
    const itemsHtml=(o.items||[]).map(i=>`
      <div class="line-item">
        <div>${esc(i.name)}<br><span class="li-q">Tam. ${esc(i.size)} · Qtd ${i.qty}${i.col?(' · '+esc(i.col)):''}</span></div>
        <div>${money(priceNum(i.price)*(i.qty||1))}</div>
      </div>`).join('') || '<div class="kv"><span>Sem itens.</span></div>';

    const addrLines=[];
    if(c.street) addrLines.push(esc(c.street));
    if(c.number) addrLines.push('Nº '+esc(c.number));
    if(c.complement) addrLines.push(esc(c.complement));
    if(c.cep) addrLines.push('CEP '+esc(c.cep));
    const addrBlock = addrLines.length ? '<div class="addr">'+addrLines.join('<br>')+'</div>'
                    : (c.address ? '<div class="addr">'+esc(c.address)+'</div>' : '<div class="kv"><span>Sem endereço.</span></div>');

    let actions='';
    if(st==='pending') actions+=`<button class="btn" data-act="paid">Marcar como pago</button>`;
    if(st==='paid'||st==='pending') actions+=`<button class="btn btn-soft" data-act="shipped">Marcar como despachado</button>`;
    if(st==='shipped') actions+=`<button class="btn btn-ghost" data-act="paid">Voltar para “pago”</button>`;
    if(st!=='cancelled') actions+=`<button class="btn btn-danger" data-act="cancelled">Cancelar pedido</button>`;
    if(st==='cancelled') actions+=`<button class="btn btn-ghost" data-act="pending">Reabrir pedido</button>`;

    $('sheetBody').innerHTML=`
      <h3>${esc(c.name||'Pedido')}</h3>
      <div class="oid">${esc(o.id)}</div>
      <span class="pill ${st}">${STATUS_LABEL[st]||st}</span>

      <div class="sec-label">Itens</div>
      ${itemsHtml}
      <div class="totbar"><span>Total</span><b>${money(o.total)}</b></div>

      <div class="sec-label">Contato</div>
      <div class="kv"><span>WhatsApp:</span> ${esc(c.phone||'—')}</div>
      ${c.phone?`<a class="rcpt" href="https://wa.me/${String(c.phone).replace(/\D/g,'')}" target="_blank">Abrir conversa no WhatsApp →</a>`:''}

      <div class="sec-label">Entrega</div>
      ${addrBlock}

      ${o.receiptUrl?`<div class="sec-label">Comprovante</div><a class="rcpt" href="${esc(o.receiptUrl)}" target="_blank">Ver recibo do pagamento →</a>`:''}

      <div class="actions">${actions}</div>
    `;
    $('sheetBody').querySelectorAll('[data-act]').forEach(b=>{
      b.addEventListener('click', ()=>updateStatus(o.id, b.dataset.act, b));
    });
    openSheetUI();
  }

  function priceNum(p){
    if(typeof p==='number') return p;
    return parseFloat(String(p||'').replace(/[^\d,]/g,'').replace(',','.'))||0;
  }

  async function updateStatus(oid, status, btn){
    const label=btn.textContent;
    btn.disabled=true; btn.textContent='Salvando…';
    try{
      const patch={status};
      if(status==='paid')    patch.paidAt=firebase.firestore.FieldValue.serverTimestamp();
      if(status==='shipped') patch.shippedAt=firebase.firestore.FieldValue.serverTimestamp();
      await db.collection('orders').doc(oid).update(patch);
      const o=ORDERS.find(x=>x.id===oid); if(o) o.status=status;
      renderOrders();
      closeSheetUI();
      toast('Pedido: '+(STATUS_LABEL[status]||status));
    }catch(ex){
      btn.disabled=false; btn.textContent=label;
      toast('Erro ao salvar ('+(ex.code||'')+')');
    }
  }

  function openSheetUI(){ $('sheetBg').classList.add('open'); $('sheet').classList.add('open'); document.body.style.overflow='hidden'; }
  function closeSheetUI(){ $('sheetBg').classList.remove('open'); $('sheet').classList.remove('open'); document.body.style.overflow=''; }
  $('sheetBg').addEventListener('click', closeSheetUI);

  /* ---------------- STOCK ---------------- */
  async function loadStock(){
    const el=$('stockList');
    try{
      const results = await Promise.all(PRODUCTS.map(async p=>{
        let ss={P:0,M:0,G:0,GG:0};
        try{
          const snap=await db.collection('products').doc(p.id).get();
          if(snap.exists && snap.data().sizeStock) ss={...ss, ...snap.data().sizeStock};
        }catch(e){}
        return {...p, sizeStock:ss};
      }));
      stockDraft={};
      results.forEach(r=>stockDraft[r.id]={...r.sizeStock});
      renderStock(results);
    }catch(ex){
      el.innerHTML='<div class="empty"><span class="star">✦</span>Não consegui carregar o estoque.</div>';
    }
  }

  function stockTotal(id){ return SIZES.reduce((s,k)=>s+(stockDraft[id][k]||0),0); }

  function renderStock(list){
    const el=$('stockList');
    el.innerHTML=list.map(p=>`
      <div class="prow" data-pid="${p.id}">
        <div class="prow-head">
          <div class="pinfo">
            <div class="pname">${esc(p.name)}</div>
            <div class="psub">${esc(p.sub)}</div>
          </div>
          <div class="ptot">Total <b data-tot="${p.id}">${stockTotal(p.id)}</b></div>
        </div>
        <div class="sizes">
          ${SIZES.map(k=>`
            <div class="sz">
              <div class="k">${k}</div>
              <div class="stepper">
                <button data-step="-1" data-pid="${p.id}" data-k="${k}">−</button>
                <span class="v" data-v="${p.id}-${k}">${stockDraft[p.id][k]||0}</span>
                <button data-step="1" data-pid="${p.id}" data-k="${k}">+</button>
              </div>
            </div>`).join('')}
        </div>
        <div class="save-row">
          <button class="btn" data-save="${p.id}">Salvar estoque</button>
          <span class="saved-ok" data-ok="${p.id}">✦ salvo</span>
        </div>
      </div>`).join('');

    el.querySelectorAll('[data-step]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const pid=b.dataset.pid, k=b.dataset.k, dir=parseInt(b.dataset.step,10);
        stockDraft[pid][k]=Math.max(0,(stockDraft[pid][k]||0)+dir);
        el.querySelector(`[data-v="${pid}-${k}"]`).textContent=stockDraft[pid][k];
        el.querySelector(`[data-tot="${pid}"]`).textContent=stockTotal(pid);
      });
    });
    el.querySelectorAll('[data-save]').forEach(b=>{
      b.addEventListener('click', ()=>saveStock(b.dataset.save, b));
    });
  }

  async function saveStock(pid, btn){
    btn.disabled=true; const orig=btn.textContent; btn.textContent='Salvando…';
    try{
      await db.collection('products').doc(pid).set({sizeStock:stockDraft[pid]}, {merge:true});
      const ok=document.querySelector(`[data-ok="${pid}"]`);
      if(ok){ok.classList.add('show'); setTimeout(()=>ok.classList.remove('show'),1800);}
      toast('Estoque salvo');
    }catch(ex){
      toast('Erro ao salvar ('+(ex.code||'')+')');
    }finally{
      btn.disabled=false; btn.textContent=orig;
    }
  }
</script>
</body>
</html>
